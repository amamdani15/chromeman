# =============================================================================
# chromeman — example display config
# =============================================================================
# Copy this file to ~/chrome-manager/chrome-displays.conf and edit as needed.
# Run `chromeman init` to generate a blank copy automatically.
#
# FORMAT
#   Each display is defined by a numbered block of three keys:
#     DISPLAY_<N>_WORKSPACE   Virtual desktop number (1-indexed)
#     DISPLAY_<N>_URL         Full URL to open in Chrome
#     DISPLAY_<N>_PROFILE     Unique Chrome profile directory name (no spaces)
#
# NOTES
#   - N must start at 1 and be contiguous (1, 2, 3 — not 1, 3)
#   - PROFILE values must be unique across all displays
#   - Chrome profile data is stored at ~/.config/<PROFILE>
#   - Restart chromeman after editing this file
# =============================================================================


# --- Display 1: Main prayer hall screen (livestream / camera feed) -----------
DISPLAY_1_WORKSPACE=1
DISPLAY_1_URL=https://www.youtube.com/live
DISPLAY_1_PROFILE=chrome-kiosk-1


# --- Display 2: Donation / fundraising thermometer ---------------------------
DISPLAY_2_WORKSPACE=2
DISPLAY_2_URL=https://fundraiser.example.com/thermometer
DISPLAY_2_PROFILE=chrome-kiosk-2


# --- Display 3: Announcements / event schedule --------------------------------
DISPLAY_3_WORKSPACE=3
DISPLAY_3_URL=https://announcements.example.com
DISPLAY_3_PROFILE=chrome-kiosk-3


# =============================================================================
# ADDING MORE DISPLAYS
# Just continue the numbering:
#
# DISPLAY_4_WORKSPACE=4
# DISPLAY_4_URL=https://another-page.example.com
# DISPLAY_4_PROFILE=chrome-kiosk-4
# =============================================================================
